name: Deploy to Lightsail

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1
        with:
          host: 16.145.215.162
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/hive
            git stash
            git pull origin main
            pm2 restart hive --update-env
            sleep 3
            curl -sf http://localhost:3002/api/health | head -c 200 || echo "⚠️ Health check failed"
