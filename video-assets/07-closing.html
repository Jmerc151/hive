<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  .container { text-align: center; }
  .logo {
    width: 80px;
    height: 80px;
    border-radius: 20px;
    background: #1c1c1e;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .logo span {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    color: #fff;
    letter-spacing: 4px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    color: #fff;
    letter-spacing: 12px;
    margin-bottom: 20px;
  }
  .tagline {
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    color: rgba(255,255,255,0.4);
    font-weight: 300;
    margin-bottom: 48px;
  }
  .built-by {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: rgba(255,255,255,0.2);
    font-weight: 300;
  }
  .accent { color: #d4a853; }
</style>
</head>
<body>
  <div class="container">
    <div class="logo"><span>H</span></div>
    <h1>HIVE</h1>
    <div class="tagline">Built by <span class="accent">one person</span>. Run by <span class="accent">six agents</span>.</div>
    <div class="built-by">hive-agents.com</div>
  </div>
</body>
</html>
