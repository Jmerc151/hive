<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    padding: 60px;
  }
  .container { text-align: center; width: 100%; max-width: 1000px; }
  .big-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 200px;
    color: #d4a853;
    line-height: 1;
    margin-bottom: 8px;
  }
  .label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 8px;
    margin-bottom: 48px;
  }
  .skills-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }
  .skill-chip {
    background: #1c1c1e;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 8px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
  }
  .skill-chip.highlight {
    border-color: rgba(212,168,83,0.3);
    color: #d4a853;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="big-number">44</div>
    <div class="label">INSTALLED SKILLS</div>
    <div class="skills-grid">
      <div class="skill-chip highlight">frontend-design</div>
      <div class="skill-chip">marketing-psychology</div>
      <div class="skill-chip highlight">technical-analysis</div>
      <div class="skill-chip">email-sequence</div>
      <div class="skill-chip">pricing-strategy</div>
      <div class="skill-chip highlight">data-analysis</div>
      <div class="skill-chip">launch-strategy</div>
      <div class="skill-chip">cold-email-mastery</div>
      <div class="skill-chip highlight">risk-management</div>
      <div class="skill-chip">content-strategy</div>
      <div class="skill-chip">seo-audit</div>
      <div class="skill-chip highlight">design-auditor</div>
      <div class="skill-chip">churn-prevention</div>
      <div class="skill-chip">paid-ads</div>
      <div class="skill-chip highlight">competitor-analysis</div>
      <div class="skill-chip">referral-program</div>
    </div>
  </div>
</body>
</html>
