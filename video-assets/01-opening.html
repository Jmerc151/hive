<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  .container {
    text-align: center;
  }
  .logo {
    width: 120px;
    height: 120px;
    border-radius: 28px;
    background: #1c1c1e;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 40px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .logo span {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    color: #fff;
    letter-spacing: 4px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 96px;
    color: #fff;
    letter-spacing: 16px;
    margin-bottom: 24px;
  }
  .tagline {
    font-family: 'Inter', sans-serif;
    font-size: 24px;
    color: rgba(255,255,255,0.5);
    font-weight: 300;
    letter-spacing: 2px;
  }
  .accent {
    color: #d4a853;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="logo"><span>H</span></div>
    <h1>HIVE</h1>
    <div class="tagline">6 AI agents. One mission. <span class="accent">Autonomous income.</span></div>
  </div>
</body>
</html>
