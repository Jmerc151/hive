<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  .container { text-align: center; }
  h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    color: #fff;
    letter-spacing: 8px;
    margin-bottom: 24px;
  }
  .sub {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    color: rgba(255,255,255,0.4);
    font-weight: 300;
    margin-bottom: 48px;
  }
  .sources {
    display: flex;
    gap: 40px;
    justify-content: center;
  }
  .source {
    text-align: center;
  }
  .source-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    color: #d4a853;
  }
  .source-label {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    font-weight: 300;
  }
</style>
</head>
<body>
  <div class="container">
    <h2>SKILL MARKETPLACE</h2>
    <div class="sub">Agents search, discover, and install their own skills</div>
    <div class="sources">
      <div class="source"><div class="source-num">27K+</div><div class="source-label">agent-skills.md</div></div>
      <div class="source"><div class="source-num">571K</div><div class="source-label">skills.sh installs</div></div>
      <div class="source"><div class="source-num">&infin;</div><div class="source-label">GitHub repos</div></div>
      <div class="source"><div class="source-num">4</div><div class="source-label">marketplaces</div></div>
    </div>
  </div>
</body>
</html>
